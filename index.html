<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Chat Window – Open Side Panel Prototype</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600&family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20,400,0,0&display=swap" rel="stylesheet" />
  <style>
    /* ─────────────────────────────────────────────────────────────
       DESIGN TOKENS  (from epochElipse/design-system src/tokens.css)
       ───────────────────────────────────────────────────────────── */
    :root {
      /* Primitives */
      --primitive-neutral-0:   #ffffff;
      --primitive-slate-100:   #f1f5f9;
      --primitive-slate-500:   #64748b;
      --primitive-slate-600:   #475569;
      --primitive-neutral-700: #404040;

      /* Semantic – bg */
      --color-bg-default:       #ffffff;
      --color-bg-default-hover: rgba(0,0,0,0.05);
      --color-bg-neutral-soft:  #f5f5f5;
      --color-bg-system-soft:   #f1f5f9;
      --color-bg-system-highlight: #e0f2fe;
      --color-bg-slate-a10:     rgba(100,116,139,0.10);
      --color-bg-neutral-dark:  #404040;

      /* Semantic – text */
      --color-text-default: rgba(0,0,0,0.90);
      --color-text-subtle:  rgba(0,0,0,0.60);
      --color-text-system:  #475569;
      --color-text-invert:  #ffffff;

      /* Semantic – border */
      --color-border-default: rgba(0,0,0,0.10);
      --color-border-active:  rgba(0,0,0,0.30);
      --color-border-focus:   #8b5cf6;

      /* Space */
      --space-025:  2px;
      --space-050:  4px;
      --space-100:  8px;
      --space-150: 12px;
      --space-200: 16px;
      --space-300: 24px;

      /* Size */
      --size-button-small:   28px;
      --size-button-medium:  32px;
      --size-icon-xsmall:    16px;
      --size-icon-small:     20px;
      --size-icon-medium:    24px;

      /* Radius */
      --radius-small:  4px;
      --radius-medium: 8px;
      --radius-large:  16px;
      --radius-full:   9999px;

      /* Border */
      --border-width-thin: 1px;

      /* Typography */
      --font-body-sm:     400 14px/1 'Open Sans', sans-serif;
      --font-body-sm-700: 600 14px/1 'Open Sans', sans-serif;
      --font-body-md-700: 600 16px/1 'Open Sans', sans-serif;
      --font-button:      600 14px/1 'Open Sans', sans-serif;
    }

    /* ─────────────────────────────────────────────────────────────
       RESET
       ───────────────────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Open Sans', sans-serif;
      background: #dde1e7;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* ─────────────────────────────────────────────────────────────
       MATERIAL SYMBOLS
       ───────────────────────────────────────────────────────────── */
    .ms {
      font-family: 'Material Symbols Rounded';
      font-weight: normal;
      font-style: normal;
      line-height: 1;
      letter-spacing: normal;
      text-transform: none;
      display: inline-block;
      white-space: nowrap;
      direction: ltr;
      -webkit-font-smoothing: antialiased;
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 20;
      user-select: none;
      flex-shrink: 0;
    }
    .ms--16 { font-size: 16px; }
    .ms--18 { font-size: 18px; }
    .ms--20 { font-size: 20px; }
    .ms--24 { font-size: 24px; }

    /* ─────────────────────────────────────────────────────────────
       ICON BUTTON  (matches IconButton.module.css from design system)
       ───────────────────────────────────────────────────────────── */
    .icon-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      padding: 0;
      border-radius: var(--radius-small);
      border: var(--border-width-thin) solid transparent;
      cursor: pointer;
      user-select: none;
      transition: background-color 80ms ease, box-shadow 80ms ease;
      background: transparent;
      color: var(--color-text-subtle);
      -webkit-appearance: none;
      appearance: none;
    }
    .icon-btn:focus-visible { outline: 2px solid var(--color-border-focus); outline-offset: 2px; }
    .icon-btn:disabled { opacity: 0.5; pointer-events: none; }
    .icon-btn--small  { width: var(--size-button-small);  height: var(--size-button-small); }
    .icon-btn--medium { width: var(--size-button-medium); height: var(--size-button-medium); }
    .icon-btn--rounded { border-radius: var(--radius-full); }

    .icon-btn[data-variant="secondary-subtle"]:hover { background: var(--color-bg-default-hover); }
    .icon-btn[data-variant="secondary-subtle"]:active { box-shadow: inset 0 0 0 2px var(--color-border-active); }

    .icon-btn[data-variant="secondary-outlined"] {
      background: var(--color-bg-default);
      border-color: var(--color-border-default);
    }
    .icon-btn[data-variant="secondary-outlined"]:hover { background: var(--color-bg-default-hover); }

    /* ─────────────────────────────────────────────────────────────
       BUTTON  (matches Button.module.css from design system)
       ───────────────────────────────────────────────────────────── */
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: var(--space-050);
      padding-inline: var(--space-100);
      font: var(--font-button);
      border-radius: var(--radius-small);
      border: var(--border-width-thin) solid transparent;
      cursor: pointer;
      white-space: nowrap;
      user-select: none;
      transition: background-color 80ms ease, box-shadow 80ms ease;
      background: transparent;
      color: var(--color-text-subtle);
      -webkit-appearance: none;
      appearance: none;
    }
    .btn:focus-visible { outline: 2px solid var(--color-border-focus); outline-offset: 2px; }
    .btn:disabled { opacity: 0.5; pointer-events: none; }
    .btn--medium { height: var(--size-button-medium); }
    .btn--small  { height: var(--size-button-small); }
    .btn--rounded { border-radius: var(--radius-full); padding-inline: 12px; }
    .btn--icon-left { padding-inline-start: var(--space-050); }

    .btn[data-variant="secondary-subtle"]:hover { background: var(--color-bg-default-hover); }
    .btn[data-variant="secondary-subtle"]:active { box-shadow: inset 0 0 0 2px var(--color-border-active); }

    /* ─────────────────────────────────────────────────────────────
       CHAT WINDOW  (456 × 640, matches Figma kai frame)
       ───────────────────────────────────────────────────────────── */
    .chat-window {
      width: 456px;
      height: 640px;
      background: var(--color-bg-default);
      border: 1px solid var(--color-border-default);
      border-radius: var(--radius-medium);
      display: flex;
      overflow: hidden;
      position: relative;
      box-shadow: 0 8px 32px rgba(0,0,0,0.12);
    }

    /* ─────────────────────────────────────────────────────────────
       SIDEBAR
       ───────────────────────────────────────────────────────────── */
    .sidebar {
      flex-shrink: 0;
      background: var(--color-bg-system-soft);
      border-right: 1px solid var(--color-border-default);
      border-radius: var(--radius-medium) 0 0 var(--radius-medium);
      display: flex;
      flex-direction: column;
      gap: var(--space-100);
      overflow: hidden;
      width: 40px;
      transition: width 240ms cubic-bezier(0.4, 0, 0.2, 1);
    }
    .sidebar--open { width: 200px; }

    .sidebar-header {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 40px;
      padding: 0 4px;
      flex-shrink: 0;
      gap: 0;
    }
    .sidebar--open .sidebar-header { justify-content: space-between; }
    .sidebar-header-kai {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 0;
      height: 32px;
      overflow: hidden;
      flex-shrink: 0;
      color: var(--color-text-default);
      opacity: 0;
      transition: width 240ms cubic-bezier(0.4,0,0.2,1), opacity 180ms ease;
    }
    .sidebar--open .sidebar-header-kai { width: 32px; opacity: 1; }

    .sidebar-nav {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
      padding: 0 4px;
      flex-shrink: 0;
    }
    .sidebar--open .sidebar-nav {
      align-items: stretch;
      padding: 0;
    }

    .nav-item {
      display: flex;
      align-items: center;
      height: 32px;
      min-width: 32px;
      max-width: 32px;
      gap: 0;
      border-radius: var(--radius-medium);
      border: none;
      background: transparent;
      color: var(--color-text-system);
      font: var(--font-body-sm-700);
      cursor: pointer;
      transition: background-color 80ms ease, max-width 240ms cubic-bezier(0.4,0,0.2,1);
      overflow: hidden;
      text-align: left;
      padding: 0 8px;
      flex-shrink: 0;
      justify-content: flex-start;
    }
    .sidebar--open .nav-item {
      max-width: 200px;
      width: 100%;
    }
    .nav-item:hover { background: var(--color-bg-default-hover); }

    .nav-label {
      white-space: nowrap;
      overflow: hidden;
      max-width: 0;
      opacity: 0;
      transition: max-width 240ms cubic-bezier(0.4,0,0.2,1), opacity 180ms ease;
      padding-left: 0;
    }
    .sidebar--open .nav-label {
      max-width: 140px;
      opacity: 1;
      padding-left: 4px;
    }

    .chats-section {
      display: flex;
      flex-direction: column;
      flex: 1;
      overflow: hidden;
      min-height: 0;
      opacity: 0;
      transition: opacity 160ms ease;
      pointer-events: none;
    }
    .sidebar--open .chats-section {
      opacity: 1;
      pointer-events: auto;
    }

    .chats-title {
      display: flex;
      align-items: center;
      height: 32px;
      padding: 0 8px;
      font: var(--font-body-sm-700);
      color: var(--color-text-system);
      flex-shrink: 0;
    }

    .chats-list {
      flex: 1;
      overflow-y: auto;
      min-height: 0;
      padding: 0;
    }

    .chat-item {
      display: flex;
      align-items: center;
      height: 32px;
      padding: 0 8px;
      border-radius: var(--radius-medium);
      cursor: pointer;
      font: var(--font-body-sm);
      color: var(--color-text-system);
      transition: background-color 80ms ease;
      white-space: nowrap;
      overflow: hidden;
    }
    .chat-item span { flex: 1; overflow: hidden; text-overflow: ellipsis; }
    .chat-item:hover { background: var(--color-bg-default-hover); }
    .chat-item--active {
      background: var(--color-bg-slate-a10);
      color: var(--color-text-default);
      font: var(--font-body-sm);
    }

    /* ─────────────────────────────────────────────────────────────
       MAIN CHAT AREA
       ───────────────────────────────────────────────────────────── */
    .chat-main {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-width: 0;
      overflow: hidden;
    }

    .panel-header {
      display: flex;
      align-items: center;
      height: 40px;
      padding: 0 8px;
      gap: var(--space-050);
      flex-shrink: 0;
      border-bottom: 1px solid var(--color-border-default);
    }
    .panel-header-logo {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 32px;
      height: 32px;
      flex-shrink: 0;
      color: var(--color-text-default);
    }
    .panel-header-title {
      flex: 1;
      font: var(--font-body-md-700);
      color: var(--color-text-default);
    }
    .panel-header-actions {
      display: flex;
      align-items: center;
    }

    .chat-feed {
      flex: 1;
      overflow-y: auto;
      padding: var(--space-200);
      display: flex;
      flex-direction: column;
      gap: var(--space-200);
      align-items: flex-end;
      min-height: 0;
    }

    .user-bubble {
      background: var(--color-bg-system-highlight);
      padding: var(--space-100) var(--space-150);
      border-radius: var(--radius-large) var(--radius-large) 0 var(--radius-large);
      font: var(--font-body-sm);
      color: var(--color-text-default);
      max-width: 80%;
      flex-shrink: 0;
      word-break: break-word;
      line-height: 1.4;
    }

    .agent-response {
      display: flex;
      flex-direction: column;
      gap: var(--space-100);
      padding: var(--space-100);
      border-radius: var(--radius-large) var(--radius-large) var(--radius-large) 0;
      width: 100%;
      flex-shrink: 0;
      align-self: stretch;
    }
    .agent-response-title {
      font: var(--font-body-sm-700);
      color: var(--color-text-default);
      line-height: 1.4;
    }
    .agent-response-body {
      font: var(--font-body-sm);
      color: var(--color-text-default);
      line-height: 1.4;
    }

    .response-actions {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      height: 24px;
    }
    .action-icon-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 24px;
      height: 24px;
      border-radius: var(--radius-large);
      border: none;
      background: transparent;
      cursor: pointer;
      color: var(--color-text-subtle);
      transition: background-color 80ms ease;
      flex-shrink: 0;
    }
    .action-icon-btn:hover { background: var(--color-bg-default-hover); }
    .action-icon-btn:focus-visible { outline: 2px solid var(--color-border-focus); outline-offset: 1px; }

    .input-area {
      padding: 0 var(--space-200) var(--space-200);
      flex-shrink: 0;
    }
    .input-box {
      display: flex;
      align-items: center;
      background: var(--color-bg-slate-a10);
      border: 1px solid var(--color-border-default);
      border-radius: 24px;
      padding: var(--space-100);
      gap: var(--space-050);
      cursor: text;
      min-height: 40px;
    }
    .input-box-icon {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 32px;
      height: 32px;
      flex-shrink: 0;
      border-radius: var(--radius-large);
      color: var(--color-text-subtle);
    }
    .input-placeholder {
      flex: 1;
      font: var(--font-body-md-700);
      color: var(--color-text-subtle);
      user-select: none;
    }

    /* ─────────────────────────────────────────────────────────────
       TOOLTIP  — fixed overlay, never clipped by parent overflow
       ───────────────────────────────────────────────────────────── */
    .tooltip {
      position: fixed;
      transform: translate(0, -50%);
      background: var(--color-bg-neutral-dark);
      color: var(--color-text-invert);
      font: 400 12px/1.3 'Open Sans', sans-serif;
      padding: 6px 8px;
      border-radius: var(--radius-small);
      white-space: nowrap;
      pointer-events: none;
      z-index: 9999;
    }
    .tooltip::after {
      content: '';
      position: absolute;
      top: 50%;
      left: 0;
      transform: translateX(-50%) translateY(-50%) rotate(45deg);
      width: 8px;
      height: 8px;
      background: var(--color-bg-neutral-dark);
      border-radius: 1px;
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <script type="text/babel">
    const { useState, useCallback, useRef } = React;
    const { createPortal } = ReactDOM;

    /* ── Material Symbols icon names ─────────────────────────────── */
    const I = {
      edit:       'edit',
      search:     'search',
      attach:     'attach_file',
      folder:     'folder',
      help:       'help',
      settings:   'settings',
      minimize:   'minimize',
      close:      'close',
      copy:       'content_copy',
      thumbUp:    'thumb_up',
      thumbDown:  'thumb_down',
      refresh:    'refresh',
      moreVert:   'more_vert',
      add:        'add',
      panelOpen:  'last_page',
      panelClose: 'first_page',
    };

    /* ── KAI icon: 6-arm asterisk ────────────────────────────────── */
    function KaiIcon({ size = 20 }) {
      const c = size / 2;
      const arm = size * 0.38;
      const w   = size * 0.12;
      const r   = w / 2;
      const rects = [0, 45, 90, 135].map(deg => (
        <rect
          key={deg}
          x={c - w / 2}
          y={c - arm}
          width={w}
          height={arm * 2}
          rx={r}
          transform={`rotate(${deg} ${c} ${c})`}
        />
      ));
      return (
        <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`} fill="currentColor">
          {rects}
        </svg>
      );
    }

    /* ── Material Symbol span ────────────────────────────────────── */
    function MsIcon({ name, size = 16 }) {
      return <span className={`ms ms--${size}`}>{name}</span>;
    }

    /* ── Design-system IconButton ─────────────────────────────────── */
    function IconButton({
      icon,
      label,
      size = 'medium',
      variant = 'secondary-subtle',
      rounded = true,
      onClick,
      active = false,
    }) {
      return (
        <button
          type="button"
          className={`icon-btn icon-btn--${size} ${rounded ? 'icon-btn--rounded' : ''}`}
          data-variant={variant}
          aria-label={label}
          onClick={onClick}
          style={active ? { background: 'var(--color-bg-default-hover)' } : undefined}
        >
          <MsIcon name={icon} size={16} />
        </button>
      );
    }

    /* ── Tooltip overlay via React portal ────────────────────────── */
    function WithTooltip({ tip, children }) {
      const [pos, setPos] = useState(null);
      const triggerRef = useRef(null);

      const show = useCallback(() => {
        if (triggerRef.current) {
          const r = triggerRef.current.getBoundingClientRect();
          setPos({ x: r.right + 8, y: r.top + r.height / 2 });
        }
      }, []);

      const hide = useCallback(() => setPos(null), []);

      return (
        <>
          <span
            ref={triggerRef}
            onMouseEnter={show}
            onMouseLeave={hide}
            style={{ display: 'inline-flex' }}
          >
            {children}
          </span>
          {pos && createPortal(
            <div
              className="tooltip"
              role="tooltip"
              style={{ left: pos.x, top: pos.y }}
            >
              {tip}
            </div>,
            document.body
          )}
        </>
      );
    }

    /* ── NavItem ─────────────────────────────────────────────────── */
    function NavItem({ icon, label, showTooltip }) {
      const btn = (
        <button type="button" className="nav-item">
          <MsIcon name={icon} size={16} />
          <span className="nav-label">{label}</span>
        </button>
      );
      return showTooltip ? <WithTooltip tip={label}>{btn}</WithTooltip> : btn;
    }

    /* ── ChatItem ─────────────────────────────────────────────────── */
    function ChatItem({ label, active }) {
      return (
        <div className={`chat-item ${active ? 'chat-item--active' : ''}`} role="button" tabIndex={0}>
          <span>{label}</span>
        </div>
      );
    }

    /* ── Agent message ───────────────────────────────────────────── */
    function AgentMessage({ title, body }) {
      const actions = [
        { icon: I.copy,      label: 'Copy' },
        { icon: I.thumbUp,   label: 'Good response' },
        { icon: I.thumbDown, label: 'Poor response' },
        { icon: I.refresh,   label: 'Regenerate' },
        { icon: I.moreVert,  label: 'More options' },
      ];
      return (
        <div className="agent-response">
          <div className="agent-response-title">{title}</div>
          <div className="agent-response-body">{body}</div>
          <div className="response-actions">
            {actions.map(({ icon, label }) => (
              <WithTooltip key={label} tip={label}>
                <button type="button" className="action-icon-btn" aria-label={label}>
                  <MsIcon name={icon} size={16} />
                </button>
              </WithTooltip>
            ))}
          </div>
        </div>
      );
    }

    /* ── User message ────────────────────────────────────────────── */
    function UserMessage({ text }) {
      return <div className="user-bubble">{text}</div>;
    }

    /* ── Sidebar ─────────────────────────────────────────────────── */
    function Sidebar({ open, onToggle }) {
      const navItems = [
        { icon: I.edit,   label: 'New Chat' },
        { icon: I.search, label: 'Search Chats' },
        { icon: I.attach, label: 'Attachments' },
        { icon: I.folder, label: 'Projects' },
      ];

      return (
        <aside className={`sidebar ${open ? 'sidebar--open' : ''}`} aria-label="Chat sidebar">
          <div className="sidebar-header">
            <div className="sidebar-header-kai" aria-hidden="true">
              <KaiIcon size={18} />
            </div>
            <WithTooltip tip={open ? 'Close Sidebar' : 'Open Sidebar'}>
              <IconButton
                icon={open ? I.panelClose : I.panelOpen}
                label={open ? 'Close Sidebar' : 'Open Sidebar'}
                variant="secondary-subtle"
                rounded={false}
                onClick={onToggle}
              />
            </WithTooltip>
          </div>

          <nav className="sidebar-nav">
            {navItems.map(({ icon, label }) => (
              <NavItem key={label} icon={icon} label={label} showTooltip={!open} />
            ))}
          </nav>

          <div className="chats-section" aria-hidden={!open}>
            <div className="chats-title">Chats</div>
            <div className="chats-list">
              <ChatItem label="Alpha Thread"  active={true} />
              <ChatItem label="Gamma Thread"  active={false} />
              <ChatItem label="Omega Thread"  active={false} />
            </div>
          </div>
        </aside>
      );
    }

    /* ── Main chat window ────────────────────────────────────────── */
    function AIChatWindow() {
      const [sidebarOpen, setSidebarOpen] = useState(false);
      const toggleSidebar = useCallback(() => setSidebarOpen(v => !v), []);

      const messages = [
        { type: 'user',  text: 'Some prompt entered by user' },
        { type: 'agent', title: "Here's a response from the agent", body: 'The action you requested has been completed. Consider this follow-up action that I can also perform.' },
        { type: 'user',  text: 'Some prompt entered by user' },
        { type: 'agent', title: "Here's a response from the agent", body: 'The action you requested has been completed. Consider this follow-up action that I can also perform.' },
        { type: 'user',  text: 'Some prompt entered by user' },
        { type: 'agent', title: "Here's a response from the agent", body: 'The action you requested has been completed. Consider this follow-up action that I can also perform.' },
      ];

      return (
        <div className="chat-window" role="dialog" aria-label="AI Chat">
          <Sidebar open={sidebarOpen} onToggle={toggleSidebar} />

          <main className="chat-main">
            <header className="panel-header">
              <div className="panel-header-logo" aria-hidden="true">
                <KaiIcon size={20} />
              </div>
              <h1 className="panel-header-title">AI</h1>
              <div className="panel-header-actions">
                <WithTooltip tip="Help">
                  <IconButton icon={I.help}     label="Help"     variant="secondary-subtle" />
                </WithTooltip>
                <WithTooltip tip="Settings">
                  <IconButton icon={I.settings} label="Settings" variant="secondary-subtle" />
                </WithTooltip>
                <WithTooltip tip="Minimize">
                  <IconButton icon={I.minimize} label="Minimize" variant="secondary-subtle" />
                </WithTooltip>
                <WithTooltip tip="Close">
                  <IconButton icon={I.close}    label="Close"    variant="secondary-subtle" />
                </WithTooltip>
              </div>
            </header>

            <div className="chat-feed" role="log" aria-live="polite">
              {messages.map((msg, i) =>
                msg.type === 'user'
                  ? <UserMessage key={i} text={msg.text} />
                  : <AgentMessage key={i} title={msg.title} body={msg.body} />
              )}
            </div>

            <div className="input-area">
              <div className="input-box" role="button" tabIndex={0} aria-label="Ask Agent">
                <span className="input-box-icon" aria-hidden="true">
                  <MsIcon name={I.add} size={20} />
                </span>
                <span className="input-placeholder">Ask Agent</span>
              </div>
            </div>
          </main>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<AIChatWindow />);
  </script>
</body>
</html>
